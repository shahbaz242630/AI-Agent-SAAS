# CI — runs on every PR and push to main (BRD 9.10).
# Security gates per docs/SECURITY-TESTING-STRATEGY.md Section 4: every PR runs
# the verify gate plus secrets/dependency/workflow scans. CodeQL (default
# setup) and secret scanning + push protection are enabled at repo level.
# All actions are pinned to full commit SHAs; GITHUB_TOKEN is read-only.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      # Test Postgres for @eva/database migration/seed/integration specs (BRD 13).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eva
          POSTGRES_PASSWORD: eva
          POSTGRES_DB: eva
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eva"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.15.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (packages first, topological order)
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Create test database
        run: PGPASSWORD=eva psql -h localhost -U eva -d postgres -c "CREATE DATABASE eva_test;"

      - name: Unit tests
        run: pnpm run test
        env:
          DATABASE_URL: postgresql://eva:eva@localhost:5432/eva_test

      - name: Format check
        run: pnpm run format:check

  security:
    name: Security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # zizmor SARIF upload (fails on push-to-main without it)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.15.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc

      - name: Dependency vulnerability audit (fails on high/critical)
        run: pnpm audit --audit-level=high

      - name: Workflow security lint (zizmor)
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Blocks PRs that INTRODUCE high/critical vulnerable dependencies.
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
