# CI — runs on every PR and push to main (BRD 9.10).
# GitHub requires workflows under .github/workflows; BRD's infrastructure/ci
# intent is satisfied here (see docs/PHASE-0-PLAN.md Section 10).
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      # Test Postgres for @eva/database migration/seed/integration specs (BRD 13).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eva
          POSTGRES_PASSWORD: eva
          POSTGRES_DB: eva
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eva"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (packages first, topological order)
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Create test database
        run: PGPASSWORD=eva psql -h localhost -U eva -d postgres -c "CREATE DATABASE eva_test;"

      - name: Unit tests
        run: pnpm run test
        env:
          DATABASE_URL: postgresql://eva:eva@localhost:5432/eva_test

      - name: Format check
        run: pnpm run format:check
