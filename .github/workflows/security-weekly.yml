# Weekly security sweep (docs/SECURITY-TESTING-STRATEGY.md Section 4).
# Non-blocking scheduled checks: full-history secrets scan, filesystem
# vulnerability/misconfig scan, container image scans + SBOM evidence.
# ZAP baseline/API scans join this workflow once staging exists (Slice 0.4).
name: Security (weekly)

on:
  schedule:
    - cron: "17 4 * * 1" # Mondays 04:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-history:
    name: Full-history secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  filesystem-scan:
    name: Filesystem vulnerability + misconfig scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  image-scan:
    name: Build and scan container images + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Build api image
        run: docker build -f infrastructure/docker/Dockerfile.api -t eva-api:scan .

      - name: Build worker image
        run: docker build -f infrastructure/docker/Dockerfile.worker -t eva-worker:scan .

      - name: Scan api image
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: eva-api:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan worker image
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: eva-worker:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOMs (CycloneDX)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: eva-api:scan
          format: cyclonedx
          output: sbom-api.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom-api.json
          retention-days: 90
